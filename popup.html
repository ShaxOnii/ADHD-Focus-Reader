<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>ADHD Focus Reader</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ADHD Focus Reader</h1>
            <div class="lang-toggle">
                <button id="langPl" class="lang-btn active">PL</button>
                <button id="langEn" class="lang-btn">EN</button>
            </div>
        </div>
        
        <div class="setting-group">
            <label class="switch-container">
                <span class="label-text" id="lblEnable">Włącz wtyczkę</span>
                <label class="switch">
                    <input type="checkbox" id="enableExtension">
                    <span class="slider round"></span>
                </label>
            </label>
        </div>

        <div class="setting-group">
            <h3 id="lblBoldMode">Tryb pogrubiania</h3>
            <div class="radio-group">
                <label><input type="radio" name="boldMode" value="start" checked> <span id="lblModeStart">Początek słowa</span></label>
                <label><input type="radio" name="boldMode" value="end"> <span id="lblModeEnd">Koniec słowa</span></label>
                <label><input type="radio" name="boldMode" value="both"> <span id="lblModeBoth">Oba (początek i koniec)</span></label>
            </div>
        </div>
        
        <div class="setting-group">
            <h3 id="lblFontSize">Wielkość czcionki</h3>
            <div class="volume-container">
                <label for="fontSlider"><span id="lblFontValue">100%</span></label>
                <input type="range" id="fontSlider" min="100" max="200" step="10" value="100">
            </div>
        </div>

        <div class="setting-group">
            <h3 id="lblMusicTitle">Muzyka w tle (Focus & Chill)</h3>
            <label class="switch-container">
                <span class="label-text" id="lblMusicEnable">Włącz inteligentną muzykę</span>
                <label class="switch">
                    <input type="checkbox" id="enableMusic">
                    <span class="slider round"></span>
                </label>
            </label>
            
            <div class="volume-container">
                <label for="volumeSlider" id="lblVolume">Głośność:</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.2">
            </div>
            
            <div id="currentMood" class="status-text"><span id="lblMoodTitle">Wykryty nastrój:</span> <span id="moodValue">Brak (Oczekiwanie na skan)</span></div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
